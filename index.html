<!DOCTYPE html>
<html>
<head>
  <title>Question ❤️</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      margin-top: 100px;
      overflow: hidden;
    }

    button {
      padding: 12px 24px;
      font-size: 20px;
      margin: 10px;
      cursor: pointer;
    }

    #no {
      position: absolute;
    }
  </style>
</head>
<body>

<h1>Will you be my girlfriend? ❤️</h1>

<button onclick="yes()">Yes</button>
<button id="no">No</button>

<script>
const no = document.getElementById("no");

function moveButton() {
  no.style.left = Math.random() * (window.innerWidth - 100) + "px";
  no.style.top = Math.random() * (window.innerHeight - 50) + "px";
}

no.addEventListener("mouseover", moveButton);
no.addEventListener("touchstart", moveButton);

function yes() {
  document.body.innerHTML =
    "<h1>YAY!!! ❤️🥰</h1><h2>I knew you'd say yes!</h2>";
}
</script>

</body>
</html>
